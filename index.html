<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Reminder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0c2228;
  --s1:         #132e38;
  --s2:         #1a3d4a;
  --s3:         #214858;
  --topbar:     #091b21;
  --border:     rgba(76,157,176,.35);
  --border-hi:  rgba(255,240,185,.6);
  --text:       #FFF3C4;          /* brighter vanilla — near white warmth */
  --text-sub:   #EDD87A;          /* stronger gold for secondary text */
  --muted:      #9DCFDE;          /* lighter moonstone — much more readable */
  --accent:     #5BB5CB;
  --accent-hi:  #8DD4E4;          /* brighter hover state */
  --vanilla:    #FFF3C4;
  --glow:       rgba(76,157,176,.25);
  --danger:     #ff9e96;          /* slightly brighter for dark bg */
  --success:    #95d9a8;
  --warn:       #ffe07a;
  --r:    12px;
  --ease: cubic-bezier(.4,0,.2,1);
  --t:    .18s cubic-bezier(.4,0,.2,1);
  --serif:'Playfair Display', Georgia, serif;
  --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}
body.light {
  --bg:         #F5D97A;          /* richer warm yellow — less washed out */
  --s1:         #E8C85C;
  --s2:         #D9B63E;
  --s3:         #CBAA2E;
  --topbar:     #0d333d;          /* deeper teal for max contrast */
  --border:     rgba(10,55,70,.28);
  --border-hi:  rgba(10,55,70,.65);
  --text:       #071820;          /* near-black teal — maximum contrast */
  --text-sub:   #0f3040;
  --muted:      #1d5a6e;          /* richer teal for muted text */
  --accent:     #0f3040;
  --accent-hi:  #1a4e62;
  --vanilla:    #F5D97A;
  --glow:       rgba(10,55,70,.15);
  --danger:     #991f14;
  --success:    #145c2e;
  --warn:       #6b4800;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--sans);
  font-size: 15px;               /* up from browser default 14-ish */
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  transition: background var(--t), color var(--t);
  overflow-x: hidden;
}
.page {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  overflow: hidden;
}
.topbar {
  grid-column: 1/-1; grid-row: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--topbar);
  border-bottom: 1px solid rgba(255,235,175,.12);
  z-index: 50;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:30px; height:30px; border-radius:8px;
  background: var(--vanilla);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0;
}
.brand h1 {
  font-family: var(--serif);
  font-style: italic; font-size:1.35rem; font-weight:500;
  color: var(--vanilla); letter-spacing:.01em;
}
.topbar-right { display:flex; align-items:center; gap:6px; }
.stats-group  { display:flex; gap:4px; margin-right:6px; }
.stat-pill {
  display:flex; flex-direction:column; align-items:center;
  padding:3px 10px;
  background: rgba(255,243,196,.1);
  border: 1px solid rgba(255,243,196,.22);
  border-radius:7px; min-width:52px;
}
.stat-pill .n { font-family:var(--mono); font-size:1rem; font-weight:500; color: var(--vanilla); line-height:1.1; }
.stat-pill .l { font-size:.62rem; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color: rgba(255,243,196,.65); }
.icon-btn {
  display:flex; align-items:center; gap:4px;
  padding:6px 13px;
  background: rgba(255,243,196,.09);
  border: 1px solid rgba(255,243,196,.22);
  border-radius:7px;
  color: rgba(255,243,196,.85);
  font-family:var(--sans); font-size:.8rem; font-weight:500;
  cursor:pointer; transition:all var(--t); white-space:nowrap;
}
.icon-btn:hover { background:rgba(255,243,196,.18); color:var(--vanilla); border-color:rgba(255,243,196,.5); }
.theme-btn {
  width:32px; height:32px; border-radius:7px;
  border:1px solid rgba(255,235,175,.18);
  background:rgba(255,235,175,.08);
  cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--t); color:var(--vanilla);
}
.theme-btn:hover { background:rgba(255,235,175,.18); border-color:rgba(255,235,175,.4); }

/* notification permission banner */
#notifBanner {
  display:none;
  background: rgba(255,224,122,.14);
  border: 1px solid rgba(255,224,122,.5);
  border-radius:9px; padding:10px 15px; margin-bottom:12px;
  font-size:.84rem; color:var(--warn);
  align-items:center; gap:8px; flex-wrap:wrap;
}
#notifBanner.show { display:flex; }
#notifBanner strong { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; }
#allowNotifBtn {
  padding:5px 13px; border-radius:6px;
  background:var(--warn); border:none;
  color:#071820; font-family:var(--mono); font-size:.66rem; font-weight:500;
  text-transform:uppercase; letter-spacing:.07em; cursor:pointer;
  transition:opacity var(--t);
}
#allowNotifBtn:hover { opacity:.8; }

.sidebar {
  grid-column:1; grid-row:2;
  background: var(--s1);
  border-right: 1px solid var(--border);
  overflow-y:auto; padding:20px 18px 32px;
}
.sidebar-head {
  font-family:var(--serif); font-style:italic;
  font-size:1.15rem; font-weight:500;
  color: var(--text);
  margin-bottom:16px; padding-bottom:12px;
  border-bottom:1px solid var(--border);
  opacity:.9;
}
.main {
  grid-column:2; grid-row:2;
  overflow-y:auto; padding:20px 26px 40px;
  background: var(--bg);
}
.field { display:flex; flex-direction:column; gap:5px; margin-bottom:13px; }
.field label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color: var(--muted); }
input[type=url], input[type=text], input[type=number], select, textarea {
  font-family:var(--sans); font-size:.9rem;
  padding:10px 13px;
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius:8px; outline:none; width:100%;
  transition:border-color var(--t),box-shadow var(--t),background var(--t);
  -webkit-appearance:none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent-hi);
  box-shadow: 0 0 0 3px var(--glow);
  background: var(--s3);
}
input::placeholder, textarea::placeholder { color: var(--muted); opacity:.8; font-size:.86rem; }
textarea { resize:vertical; min-height:64px; }
select option { background:var(--s1); color:var(--text); }
.prio-row { display:flex; gap:5px; }
.prio-btn {
  flex:1; padding:8px 4px;
  font-family:var(--mono); font-size:.68rem; font-weight:500;
  text-transform:uppercase; letter-spacing:.06em;
  border:1px solid var(--border); border-radius:7px;
  background:var(--s2); color:var(--muted);
  cursor:pointer; transition:all var(--t);
}
.prio-btn:hover { border-color:var(--accent-hi); color:var(--text); }
.prio-btn.active[data-p=low]    { background:rgba(129,201,149,.2); border-color:var(--success); color:var(--success); }
.prio-btn.active[data-p=medium] { background:rgba(253,214,99,.2);  border-color:var(--warn);    color:var(--warn); }
.prio-btn.active[data-p=high]   { background:rgba(242,139,130,.2); border-color:var(--danger);  color:var(--danger); }
.tags-wrap {
  display:flex; flex-wrap:wrap; align-items:center; gap:5px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:8px; padding:6px 9px; min-height:38px;
  cursor:text; transition:border-color var(--t),box-shadow var(--t);
}
.tags-wrap:focus-within { border-color:var(--accent-hi); box-shadow:0 0 0 3px var(--glow); }
.tag-chip {
  display:inline-flex; align-items:center; gap:3px;
  padding:3px 9px; border-radius:99px;
  background:rgba(76,157,176,.3); border:1px solid rgba(76,157,176,.6);
  font-size:.68rem; font-weight:500; color:var(--text); font-family:var(--mono);
}
.tag-chip .rm { cursor:pointer; opacity:.7; line-height:1; }
.tag-chip .rm:hover { opacity:1; color:var(--danger); }
#tagInput {
  flex:1; min-width:70px; background:transparent; border:none; outline:none;
  font-family:var(--sans); font-size:.86rem; color:var(--text); padding:0;
}
.btn-submit {
  width:100%; padding:12px; margin-top:4px;
  background: var(--vanilla);
  border:none; border-radius:9px;
  font-family:var(--mono); font-size:.78rem; font-weight:500;
  letter-spacing:.09em; text-transform:uppercase;
  color: #071820;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(255,243,196,.22);
  transition:opacity var(--t), transform .15s;
}
.btn-submit:hover { opacity:.88; transform:translateY(-1px); }
.btn-submit:active { transform:translateY(0); }
.controls-bar { display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-bottom:11px; }
.search-wrap { flex:1; min-width:160px; position:relative; }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.search-wrap input { padding-left:32px; }
.filter-sel { width:auto; padding:8px 11px; font-size:.86rem; }
.sort-chips { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
.sort-chip {
  padding:6px 13px; border-radius:7px;
  border:1px solid var(--border); background:transparent;
  color:var(--muted); font-family:var(--mono); font-size:.68rem;
  font-weight:500; letter-spacing:.05em; text-transform:uppercase;
  cursor:pointer; transition:all var(--t);
}
.sort-chip.active, .sort-chip:hover { border-color:var(--accent-hi); color:var(--text); background:rgba(76,157,176,.18); }
.prog-row {
  display:none; align-items:center; gap:9px;
  margin-bottom:14px; font-family:var(--mono); font-size:.73rem; color:var(--muted);
}
.prog-bar { flex:1; height:3px; background:var(--s2); border-radius:99px; overflow:hidden; }
.prog-fill { height:100%; border-radius:99px; background:var(--vanilla); transition:width .4s var(--ease); }
#reminderBox {
  display:none;
  background:rgba(255,158,150,.14); border:1px solid rgba(255,158,150,.5);
  border-radius:9px; padding:12px 15px; margin-bottom:12px; font-size:.86rem;
}
#reminderBox .rbh {
  font-family:var(--mono); font-size:.7rem; font-weight:500;
  text-transform:uppercase; letter-spacing:.08em; color:var(--danger); margin-bottom:5px;
}
.tab-card {
  background:var(--s1); border:1px solid var(--border);
  border-radius:var(--r); padding:14px 16px 14px 20px;
  margin-bottom:9px; position:relative;
  transition:border-color var(--t),transform var(--t),box-shadow var(--t);
  animation:fu .22s var(--ease);
}
@keyframes fu { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.tab-card:hover { border-color:var(--border-hi); transform:translateY(-1px); box-shadow:0 6px 22px rgba(0,0,0,.15); }
.tab-card.done { opacity:.45; }
.tab-card.done .tc-reason { text-decoration:line-through; }
.tab-card::before {
  content:''; position:absolute; left:0; top:10px; bottom:10px;
  width:3px; border-radius:0 3px 3px 0; background:var(--border);
}
.tab-card[data-p=low]::before    { background:var(--success); }
.tab-card[data-p=medium]::before { background:var(--warn); }
.tab-card[data-p=high]::before   { background:var(--danger); }
.tc-top { display:flex; align-items:flex-start; gap:7px; margin-bottom:4px; }
.tc-fav { width:14px; height:14px; border-radius:3px; flex-shrink:0; margin-top:3px; }
.tc-url {
  font-family:var(--mono); font-size:.78rem; font-weight:500;
  color:var(--accent-hi); text-decoration:none;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
  transition:opacity var(--t);
}
body.light .tc-url { color:var(--accent); }
.tc-url:hover { opacity:.75; }
.tc-reason { font-size:.97rem; font-weight:500; color: var(--text); margin-bottom:7px; line-height:1.55; }
.tc-note {
  font-size:.82rem; font-style:italic; color:var(--muted);
  padding:6px 10px; background:var(--s2);
  border-radius:6px; margin-bottom:8px; line-height:1.55;
  border-left:2px solid var(--border-hi);
}
.tc-meta { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.badge {
  font-family:var(--mono); font-size:.64rem; font-weight:500;
  padding:3px 9px; border-radius:99px; border:1px solid;
  letter-spacing:.03em; text-transform:uppercase;
}
.badge.time   { border-color:var(--border); color:var(--muted); background:var(--s2); }
.badge.p-low  { border-color:var(--success); color:var(--success); background:rgba(149,217,168,.15); }
.badge.p-med  { border-color:var(--warn);    color:var(--warn);    background:rgba(255,224,122,.13); }
.badge.p-high { border-color:var(--danger);  color:var(--danger);  background:rgba(255,158,150,.14); }
.badge.p-none { border-color:var(--border);  color:var(--muted);   background:var(--s2); }
.badge.remind { border-color:var(--warn);    color:var(--warn);    background:rgba(255,224,122,.13); }
.badge.tag    { border-color:rgba(91,181,203,.6); color:var(--accent-hi); background:rgba(91,181,203,.18); }
.badge.overdue{ border-color:var(--danger);  color:var(--danger);  background:rgba(255,158,150,.14); }
body.light .badge.tag { color:var(--accent); }
.tc-actions { display:flex; flex-wrap:wrap; gap:6px; }
.act-btn {
  padding:5px 13px; border-radius:7px;
  border:1px solid var(--border); background:var(--s2);
  color:var(--muted); font-family:var(--sans); font-size:.78rem; font-weight:500;
  cursor:pointer; transition:all var(--t);
  display:flex; align-items:center; gap:3px;
}
.act-btn:hover      { border-color:var(--accent-hi); color:var(--text); background:rgba(76,157,176,.18); }
.act-btn.done-btn:hover { border-color:var(--success); color:var(--success); background:rgba(149,217,168,.14); }
.act-btn.del:hover  { border-color:var(--danger); color:var(--danger); background:rgba(255,158,150,.12); }
.inline-edit {
  display:none; width:100%;
  font-family:var(--sans); font-size:.9rem;
  padding:8px 10px; margin-bottom:7px;
  background:var(--s3); color:var(--text);
  border:1px solid var(--accent-hi); border-radius:7px;
  outline:none; resize:none;
}
.inline-edit.open { display:block; }
.empty { text-align:center; padding:50px 20px; color:var(--muted); display:none; }
.empty.show { display:block; }
.empty .ei { font-size:2.4rem; margin-bottom:10px; }
.empty p { font-size:.95rem; }
.backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  backdrop-filter:blur(6px); z-index:200;
  display:none; align-items:center; justify-content:center;
}
.backdrop.open { display:flex; }
.modal {
  background:var(--s1); border:1px solid var(--border-hi);
  border-radius:15px; padding:28px; max-width:340px; width:90%;
  animation:fu .18s var(--ease);
}
.modal h3 { font-family:var(--serif); font-style:italic; font-size:1.25rem; font-weight:500; margin-bottom:8px; color:var(--text); }
.modal p { font-size:.9rem; color:var(--muted); margin-bottom:22px; line-height:1.65; }
.modal-btns { display:flex; gap:7px; justify-content:flex-end; }
.modal-btns button { padding:9px 18px; border-radius:8px; font-family:var(--sans); font-size:.84rem; font-weight:500; cursor:pointer; transition:all var(--t); }
.btn-cancel { background:var(--s2); border:1px solid var(--border); color:var(--muted); }
.btn-cancel:hover { border-color:var(--accent-hi); color:var(--text); }
.btn-del    { background:var(--danger); border:1px solid var(--danger); color:#fff; }
.btn-del:hover { opacity:.82; }
#toast {
  position:fixed; bottom:22px; right:22px;
  background:var(--s1); border:1px solid var(--border-hi);
  color:var(--text); font-size:.84rem; font-family:var(--sans);
  padding:10px 18px; border-radius:99px;
  box-shadow:0 8px 28px rgba(0,0,0,.25);
  opacity:0; transform:translateY(10px);
  transition:all .25s var(--ease); z-index:300; pointer-events:none;
}
#toast.show { opacity:1; transform:translateY(0); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--s3); border-radius:99px; }
@media(max-width:700px){
  .page { grid-template-columns:1fr; grid-template-rows:56px auto 1fr; height:auto; overflow:visible; }
  .sidebar { grid-column:1; grid-row:2; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border); }
  .main { grid-column:1; grid-row:3; height:auto; }
  .stats-group { display:none; }
  .topbar { padding:0 14px; }
}
</style>
</head>
<body>
<div class="page">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🔖</div>
      <h1>Tab Reminder</h1>
    </div>
    <div class="topbar-right">
      <div class="stats-group">
        <div class="stat-pill"><span class="n" id="sTotal">0</span><span class="l">All</span></div>
        <div class="stat-pill"><span class="n" id="sPending">0</span><span class="l">Pending</span></div>
        <div class="stat-pill"><span class="n" id="sDone">0</span><span class="l">Done</span></div>
        <div class="stat-pill"><span class="n" id="sOverdue">0</span><span class="l">Overdue</span></div>
      </div>
      <button class="icon-btn" id="exportBtn">↓ Export</button>
      <button class="icon-btn" id="importBtn">↑ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="theme-btn" id="themeBtn" title="Toggle theme">☀️</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-head">Save a tab</div>
    <form id="tabForm" autocomplete="off">
      <div class="field">
        <label>URL</label>
        <input type="url" id="url" placeholder="https://…" required>
      </div>
      <div class="field">
        <label>Why come back?</label>
        <input type="text" id="reason" placeholder="What's worth remembering?" required>
      </div>
      <div class="field">
        <label>Note <span style="text-transform:none;letter-spacing:0;font-weight:400;opacity:.6">(optional)</span></label>
        <textarea id="noteInput" placeholder="Extra context…"></textarea>
      </div>
      <div class="field">
        <label>Remind in (mins)</label>
        <input type="number" id="remindAfter" placeholder="e.g. 30" min="1">
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="prio-row">
          <button type="button" class="prio-btn active" data-p="low">Low</button>
          <button type="button" class="prio-btn" data-p="medium">Med</button>
          <button type="button" class="prio-btn" data-p="high">High</button>
        </div>
      </div>
      <div class="field">
        <label>Tags <span style="text-transform:none;letter-spacing:0;font-weight:400;opacity:.6">(Enter or ,)</span></label>
        <div class="tags-wrap" id="tagsWrap">
          <input type="text" id="tagInput" placeholder="Add tag…">
        </div>
      </div>
      <button type="submit" class="btn-submit">Save Tab →</button>
    </form>
  </aside>

  <main class="main">
    <!-- Notification permission banner -->
    <div id="notifBanner">
      <span>🔔 <strong>Enable notifications</strong> to get reminded even when you're on another tab.</span>
      <button id="allowNotifBtn">Allow</button>
    </div>

    <div class="controls-bar">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search tabs…">
      </div>
      <select id="filterSel" class="filter-sel">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="sort-chips">
      <button class="sort-chip active" data-s="newest">Newest</button>
      <button class="sort-chip" data-s="oldest">Oldest</button>
      <button class="sort-chip" data-s="priority">Priority</button>
      <button class="sort-chip" data-s="az">A–Z</button>
    </div>
    <div class="prog-row" id="progRow">
      <span id="progLabel">0%</span>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <span id="progFrac">0/0</span>
    </div>
    <div id="reminderBox">
      <div class="rbh">🔔 Reminders due</div>
      <div id="reminderList"></div>
    </div>
    <div class="empty" id="emptyState">
      <div class="ei">📭</div>
      <p>Nothing here yet — save a tab from the sidebar.</p>
    </div>
    <div id="tabList"></div>
  </main>
</div>

<div class="backdrop" id="backdrop">
  <div class="modal">
    <h3>Delete this tab?</h3>
    <p>This can't be undone. The tab will be permanently removed from your list.</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="mCancel">Cancel</button>
      <button class="btn-del" id="mConfirm">Delete</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
let tabs = JSON.parse(localStorage.getItem("tabs")) || [];
let currentTags = [];
let selectedPriority = "low";
let sortMode = "newest";
let deleteIdx = null;

// ── Tab title flashing ──────────────────────────────────────────────
let titleFlashInterval = null;
const originalTitle = document.title;

function startTitleFlash(label) {
  if (titleFlashInterval) return; // already flashing
  let toggle = false;
  titleFlashInterval = setInterval(() => {
    document.title = toggle ? `🔔 ${label}` : originalTitle;
    toggle = !toggle;
  }, 1000);
  // Stop flashing when user returns to this tab
  document.addEventListener("visibilitychange", stopTitleFlash, { once: true });
}

function stopTitleFlash() {
  if (titleFlashInterval) {
    clearInterval(titleFlashInterval);
    titleFlashInterval = null;
  }
  document.title = originalTitle;
}

// ── Notification permission ─────────────────────────────────────────
function checkNotifPermission() {
  if (!("Notification" in window)) return;
  const banner = document.getElementById("notifBanner");
  if (Notification.permission === "default") {
    banner.classList.add("show");
  } else {
    banner.classList.remove("show");
  }
}

document.getElementById("allowNotifBtn").onclick = () => {
  Notification.requestPermission().then(checkNotifPermission);
};

// ── Fire a reminder: OS notification + title flash ──────────────────
function fireReminder(tab) {
  // 1. Native OS notification — appears on top of any tab/app
  if (Notification.permission === "granted") {
    const n = new Notification("🔖 Tab Reminder", {
      body: tab.reason + "\n" + tab.url,
      icon: `https://www.google.com/s2/favicons?sz=64&domain=${(() => { try { return new URL(tab.url).hostname; } catch { return ""; } })()}`,
      tag: "tab-reminder-" + tab.createdAt, // prevents duplicate stacking
      requireInteraction: true, // stays visible until dismissed (Chrome/Edge)
    });
    // Clicking the notification focuses this tab
    n.onclick = () => { window.focus(); n.close(); };
  }

  // 2. Flash the browser tab title (visible even on other tabs in the taskbar/tab bar)
  const shortLabel = tab.reason.length > 30 ? tab.reason.slice(0, 28) + "…" : tab.reason;
  startTitleFlash(shortLabel);

  // 3. In-page reminder box (already existed)
}

// ── Core utilities ──────────────────────────────────────────────────
const save = () => localStorage.setItem("tabs", JSON.stringify(tabs));

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

function updateStats() {
  const now = Date.now();
  const total   = tabs.length;
  const pending = tabs.filter(t => t.status === "pending").length;
  const done    = tabs.filter(t => t.status === "done").length;
  const overdue = tabs.filter(t => t.remindAt && t.remindAt <= now && t.status === "pending").length;
  document.getElementById("sTotal").textContent   = total;
  document.getElementById("sPending").textContent = pending;
  document.getElementById("sDone").textContent    = done;
  document.getElementById("sOverdue").textContent = overdue;
  const pr = document.getElementById("progRow");
  if (total > 0) {
    pr.style.display = "flex";
    const pct = Math.round(done / total * 100);
    document.getElementById("progLabel").textContent = pct + "%";
    document.getElementById("progFill").style.width  = pct + "%";
    document.getElementById("progFrac").textContent  = done + "/" + total;
  } else { pr.style.display = "none"; }
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return "just now";
  if (d < 3600000) return Math.floor(d/60000) + "m ago";
  if (d < 86400000) return Math.floor(d/3600000) + "h ago";
  return Math.floor(d/86400000) + "d ago";
}
function remindLabel(ts) {
  const d = ts - Date.now();
  if (d <= 0) return "overdue";
  if (d < 3600000) return "in " + Math.ceil(d/60000) + "m";
  return "in " + Math.ceil(d/3600000) + "h";
}
function favicon(url) {
  try { return `https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`; }
  catch { return null; }
}
const prioOrder = { high:0, medium:1, low:2, none:3 };

function render() {
  const list   = document.getElementById("tabList");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filterSel").value;
  const now    = Date.now();
  list.innerHTML = "";
  let items = tabs.map((t,i) => ({...t,_i:i})).filter(t => {
    const match = t.reason.toLowerCase().includes(search) ||
      t.url.toLowerCase().includes(search) ||
      (t.tags||[]).some(tg => tg.toLowerCase().includes(search));
    return match && (filter === "all" || t.status === filter);
  });
  if (sortMode === "newest")   items.sort((a,b) => b.createdAt - a.createdAt);
  if (sortMode === "oldest")   items.sort((a,b) => a.createdAt - b.createdAt);
  if (sortMode === "priority") items.sort((a,b) => (prioOrder[a.priority]??3) - (prioOrder[b.priority]??3));
  if (sortMode === "az")       items.sort((a,b) => a.reason.localeCompare(b.reason));
  document.getElementById("emptyState").classList.toggle("show", items.length === 0);
  items.forEach(tab => {
    const i = tab._i;
    const overdue = tab.remindAt && tab.remindAt <= now && tab.status === "pending";
    const fav = favicon(tab.url);
    const prio = tab.priority || "none";
    const prioClass = {low:"p-low",medium:"p-med",high:"p-high",none:"p-none"}[prio];
    const div = document.createElement("div");
    div.className = "tab-card" + (tab.status === "done" ? " done" : "");
    div.setAttribute("data-p", prio);
    div.innerHTML = `
      <div class="tc-top">
        ${fav ? `<img class="tc-fav" src="${fav}" alt="" onerror="this.style.display='none'">` : ""}
        <a class="tc-url" href="${esc(tab.url)}" target="_blank" rel="noopener">${esc(tab.url)}</a>
      </div>
      <p class="tc-reason">${esc(tab.reason)}</p>
      ${tab.note ? `<div class="tc-note">${esc(tab.note)}</div>` : ""}
      <textarea class="inline-edit" id="ie-${i}" rows="2">${esc(tab.reason)}</textarea>
      <div class="tc-meta">
        <span class="badge time">${timeAgo(tab.createdAt)}</span>
        <span class="badge ${prioClass}">${prio === "none" ? "no priority" : prio}</span>
        ${overdue ? `<span class="badge overdue">⚡ overdue</span>` : ""}
        ${tab.remindAt && tab.remindAt > now ? `<span class="badge remind">⏰ ${remindLabel(tab.remindAt)}</span>` : ""}
        ${(tab.tags||[]).map(tg=>`<span class="badge tag">#${esc(tg)}</span>`).join("")}
      </div>
      <div class="tc-actions">
        <button class="act-btn done-btn" onclick="toggleStatus(${i})">${tab.status==="pending"?"✓ Done":"↩ Undo"}</button>
        <button class="act-btn" onclick="startEdit(${i})">✏ Edit</button>
        <button class="act-btn" onclick="copyURL(${i})">⎘ Copy</button>
        <button class="act-btn del" onclick="confirmDelete(${i})">✕ Delete</button>
      </div>`;
    list.appendChild(div);
  });
  updateStats();
}

function toggleStatus(i) {
  tabs[i].status = tabs[i].status === "pending" ? "done" : "pending";
  save(); render();
  showToast(tabs[i].status === "done" ? "✅ Marked done" : "↩ Marked pending");
}
function copyURL(i) {
  navigator.clipboard.writeText(tabs[i].url).then(() => showToast("⎘ URL copied!"));
}
function startEdit(i) {
  const el = document.getElementById("ie-" + i); if (!el) return;
  const isOpen = el.classList.contains("open");
  document.querySelectorAll(".inline-edit.open").forEach(e => e.classList.remove("open"));
  if (!isOpen) {
    el.classList.add("open"); el.focus();
    el.addEventListener("blur", () => {
      const v = el.value.trim();
      if (v && v !== tabs[i].reason) { tabs[i].reason = v; save(); render(); showToast("✏ Updated"); }
      else el.classList.remove("open");
    }, { once: true });
    el.addEventListener("keydown", e => {
      if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();el.blur();}
      if (e.key==="Escape") el.classList.remove("open");
    });
  }
}
function confirmDelete(i) {
  deleteIdx = i;
  document.getElementById("backdrop").classList.add("open");
}
document.getElementById("mCancel").onclick = () => { document.getElementById("backdrop").classList.remove("open"); deleteIdx=null; };
document.getElementById("mConfirm").onclick = () => {
  if (deleteIdx !== null) { tabs.splice(deleteIdx,1); save(); render(); showToast("🗑 Deleted"); }
  document.getElementById("backdrop").classList.remove("open"); deleteIdx=null;
};

function renderChips() {
  document.querySelectorAll(".tag-chip").forEach(c=>c.remove());
  const wrap = document.getElementById("tagsWrap");
  currentTags.forEach((tg,i) => {
    const s = document.createElement("span");
    s.className = "tag-chip";
    s.innerHTML = `#${esc(tg)} <span class="rm" data-i="${i}">×</span>`;
    s.querySelector(".rm").onclick = () => { currentTags.splice(i,1); renderChips(); };
    wrap.insertBefore(s, document.getElementById("tagInput"));
  });
}
document.getElementById("tagInput").addEventListener("keydown", e => {
  if (e.key==="Enter"||e.key===",") {
    e.preventDefault();
    const v = e.target.value.trim().replace(/,/g,"");
    if (v && !currentTags.includes(v)) { currentTags.push(v); renderChips(); }
    e.target.value = "";
  }
  if (e.key==="Backspace"&&!e.target.value&&currentTags.length) { currentTags.pop(); renderChips(); }
});

document.querySelectorAll(".prio-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".prio-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); selectedPriority = btn.dataset.p;
  };
});
document.querySelectorAll(".sort-chip").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".sort-chip").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); sortMode = btn.dataset.s; render();
  };
});

document.getElementById("tabForm").addEventListener("submit", e => {
  e.preventDefault();
  const url    = document.getElementById("url").value.trim();
  const reason = document.getElementById("reason").value.trim();
  const note   = document.getElementById("noteInput").value.trim();
  const mins   = document.getElementById("remindAfter").value;
  if (!url||!reason) return;
  tabs.unshift({ url, reason, note, priority:selectedPriority, tags:[...currentTags],
    createdAt:Date.now(), status:"pending",
    remindAt: mins ? Date.now()+mins*60000 : null, notified:false });
  save(); render(); e.target.reset();
  currentTags=[]; renderChips();
  document.querySelectorAll(".prio-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector('.prio-btn[data-p="low"]').classList.add("active");
  selectedPriority="low";
  showToast("🔖 Tab saved!");
});

document.getElementById("search").addEventListener("input", render);
document.getElementById("filterSel").addEventListener("change", render);

// ── Reminder checker — runs every 15 seconds ────────────────────────
function checkReminders() {
  const now = Date.now();
  // Find newly due reminders (not yet notified)
  const due = tabs.filter(t => t.remindAt && t.remindAt <= now && t.status === "pending" && !t.notified);
  due.forEach(t => {
    t.notified = true;
    fireReminder(t); // ← OS notification + title flash
  });
  if (due.length) save();

  // Update in-page reminder box for all overdue items
  const allOverdue = tabs.filter(t => t.remindAt && t.remindAt <= now && t.status === "pending");
  const box = document.getElementById("reminderBox");
  if (!allOverdue.length) { box.style.display="none"; return; }
  box.style.display = "block";
  document.getElementById("reminderList").innerHTML = allOverdue.map(t =>
    `<div style="margin-top:4px;font-size:.76rem">• <strong>${esc(t.reason)}</strong> — <a href="${esc(t.url)}" target="_blank" style="color:var(--warn)">${esc(t.url)}</a></div>`
  ).join("");

  // Re-render to update badges
  if (due.length) render();
}

// ── Export / Import ─────────────────────────────────────────────────
document.getElementById("exportBtn").onclick = () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(tabs,null,2)],{type:"application/json"}));
  a.download = "tab-reminder-backup.json"; a.click();
  showToast("📦 Exported!");
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", e => {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if(Array.isArray(d)){tabs=d;save();render();showToast("✅ Imported "+d.length+" tabs")}
      else showToast("❌ Invalid file");
    } catch{showToast("❌ Parse error")}
  };
  r.readAsText(f); e.target.value="";
});

// ── Theme ───────────────────────────────────────────────────────────
const themeBtn = document.getElementById("themeBtn");
if (localStorage.getItem("theme")==="light"){document.body.classList.add("light");themeBtn.textContent="🌙";}
themeBtn.onclick = () => {
  document.body.classList.toggle("light");
  const light = document.body.classList.contains("light");
  themeBtn.textContent = light?"🌙":"☀️";
  localStorage.setItem("theme", light?"light":"dark");
};

// ── Keyboard shortcut ───────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if ((e.ctrlKey||e.metaKey)&&e.key==="/") document.getElementById("url").focus();
});

// ── Stop title flash when user comes back to this tab ───────────────
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) stopTitleFlash();
});

// ── Init ────────────────────────────────────────────────────────────
render();
checkNotifPermission();
checkReminders();
setInterval(checkReminders, 15000);
</script>
</body>
</html>
